<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veículo • Mecanikas</title>
  <link rel="stylesheet" th:href="@{/css/global.css}" />
  <link rel="stylesheet" th:href="@{/css/mobile.css}" />
  <link rel="stylesheet" th:href="@{/css/searchable-select.css}" />
</head>
<body>

  <div th:replace="fragments/sidebar :: sidebar"></div>
  <div th:replace="~{fragments/mobile-nav :: mobile-nav}"></div>

  <div class="form-page-wrapper">
    <div class="form-card">

      <div class="form-card-header">
        <div class="page-eyebrow">Cadastro de Veículo</div>
        <div class="form-card-title">Novo Veículo</div>
        <div class="form-card-subtitle">Preencha os dados do veículo e selecione o cliente</div>
      </div>

      <form th:action="@{/veiculos/salvar}" th:object="${veiculo}"
            method="post" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}" />

        <div class="form-body">

          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Marca</label>
              <input type="text" th:field="*{marca}" class="form-input" placeholder="Ex: Toyota" required />
            </div>
            <div class="form-group">
              <label class="form-label">Modelo</label>
              <input type="text" th:field="*{modelo}" class="form-input" placeholder="Ex: Corolla" required />
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Ano</label>
              <input type="text" th:field="*{ano}" class="form-input" placeholder="2020"
                     maxlength="4" inputmode="numeric"
                     pattern="(19|20)[0-9]{2}"
                     title="Informe um ano válido com 4 dígitos (ex: 2020)"
                     oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                     required />
            </div>
            <div class="form-group">
              <label class="form-label">Placa</label>
              <input type="text" th:field="*{placa}" class="form-input" placeholder="ABC1234 ou ABC1D23"
                     maxlength="7"
                     pattern="[A-Za-z]{3}[0-9][0-9A-Za-z][0-9]{2}"
                     title="Formato antigo (ABC1234) ou Mercosul (ABC1D23)"
                     oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '')"
                     style="text-transform:uppercase;" required />
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Status</label>
              <select th:field="*{status}" class="form-select" required>
                <option value="EM_MANUTENCAO">Em Manutenção</option>
                <option value="MANUTENCAO_FINALIZADA">Manutenção Finalizada</option>
                <option value="AGUARDANDO_PECA">Aguardando Peça</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Cliente</label>
              <!-- Combo com busca: digite para filtrar -->
              <div class="ss-wrapper"
                   data-ss-required="true"
                   th:attr="data-ss-options=${clientesJson}">
                <input type="text" class="ss-input" autocomplete="off"
                       placeholder="Digite para buscar o cliente..." />
                <input type="hidden" name="cliente.id" th:value="${veiculo.cliente != null} ? ${veiculo.cliente.id} : ''" />
                <div class="ss-dropdown"></div>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Peça Utilizada (opcional)</label>
            <!-- Combo com busca: peça é opcional aqui -->
            <div class="ss-wrapper"
                 data-ss-required="false"
                 th:attr="data-ss-options=${pecasJson}">
              <input type="text" class="ss-input" autocomplete="off"
                     placeholder="Digite para buscar uma peça..." />
              <input type="hidden" name="peca.id" value="" />
              <div class="ss-dropdown"></div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Foto do Veículo</label>
            <input type="file" name="foto" class="form-input" accept="image/*" />
            <div th:if="${veiculo.caminhoFoto != null}" style="margin-top: 10px;">
              <img th:src="@{'/veiculos/foto/' + ${veiculo.caminhoFoto}}"
                   alt="Foto atual" style="max-width:200px; border-radius:var(--radius); border:1px solid var(--border);" />
            </div>
          </div>

        </div>

        <div class="form-footer">
          <a href="/veiculos/lista" class="btn btn-ghost">← Voltar</a>
          <button type="submit" class="btn btn-primary">Salvar Veículo</button>
        </div>

      </form>
    </div>
  </div>
  <script th:src="@{/js/searchable-select.js}"></script>
</body>
</html>
