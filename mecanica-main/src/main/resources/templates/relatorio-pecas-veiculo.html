<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peças por Veículo • Mecanikas</title>
  <link rel="stylesheet" th:href="@{/css/global.css}" />
  <link rel="stylesheet" th:href="@{/css/mobile.css}" />
</head>
<body>

  <div th:replace="fragments/sidebar :: sidebar"></div>
  <div th:replace="~{fragments/mobile-nav :: mobile-nav}"></div>

  <div class="main-content">

    <div class="page-header">
      <div class="page-title-group">
        <div class="page-eyebrow">Relatórios</div>
        <div class="page-title">Peças por Veículo</div>
        <div class="page-subtitle">Histórico de peças aplicadas em cada veículo</div>
      </div>
    </div>

    <!-- Bloco por veículo -->
    <div th:each="veiculo : ${veiculos}" style="margin-bottom: 28px;">

      <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <div>
          <div style="font-family:var(--font-display); font-size:1.1rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em;"
               th:text="${veiculo.marca + ' ' + veiculo.modelo}">
          </div>
          <div class="text-muted text-sm">
            Cliente: <strong style="color:var(--fg);" th:text="${veiculo.cliente.nome}"></strong>
            &nbsp;·&nbsp;
            Placa: <strong style="font-family:var(--font-display); color:var(--fg-muted);" th:text="${veiculo.placa}"></strong>
          </div>
        </div>
      </div>

      <div class="table-wrapper" th:if="${not #lists.isEmpty(veiculo.pecasUsadas)}">
        <table class="data-table">
          <thead>
            <tr>
              <th>Peça</th>
              <th>Quantidade Usada</th>
              <th>Valor Unitário (R$)</th>
              <th>Total (R$)</th>
              <th>Data de Uso</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="pu : ${veiculo.pecasUsadas}">
              <td style="font-weight:600;" th:text="${pu.peca.nome}"></td>
              <td th:text="${pu.quantidadeUsada}"></td>
              <td th:text="${#numbers.formatDecimal(pu.valorUnitarioAplicado, 1, 'POINT', 2, 'COMMA')}"></td>
              <td>
                <span style="font-weight:600; color:var(--accent);"
                      th:text="${'R$ ' + #numbers.formatDecimal(pu.getValorTotal(), 1, 'POINT', 2, 'COMMA')}">
                </span>
              </td>
              <td>
                <span class="text-muted text-sm"
                      th:text="${#temporals.format(pu.dataUso, 'dd/MM/yyyy HH:mm')}">
                </span>
              </td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td colspan="3" style="text-align:right; font-weight:600; color:var(--fg-muted); padding:12px 16px;">
                Total do Veículo:
              </td>
              <td style="font-weight:700; color:var(--accent); padding:12px 16px;">
                R$ <span th:text="${#numbers.formatDecimal(veiculo.pecasUsadas.stream().mapToDouble(pu -> pu.getValorTotal()).sum(), 1, 'POINT', 2, 'COMMA')}"></span>
              </td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <!-- Sem peças -->
      <div th:if="${#lists.isEmpty(veiculo.pecasUsadas)}"
           style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; color:var(--fg-muted); font-size:0.85rem;">
        Nenhuma peça registrada para este veículo.
      </div>

    </div>

    <!-- Sem veículos -->
    <div th:if="${#lists.isEmpty(veiculos)}"
         style="text-align:center; padding:60px 0; color:var(--fg-muted);">
      <div style="font-size:3rem; margin-bottom:12px;">🚗</div>
      <div style="font-family:var(--font-display); font-size:1.1rem; font-weight:700; text-transform:uppercase;">
        Nenhum veículo encontrado
      </div>
    </div>

  </div>
</body>
</html>
