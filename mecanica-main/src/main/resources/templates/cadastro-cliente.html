<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cliente • Mecanikas</title>
  <link rel="stylesheet" th:href="@{/css/global.css}" />
  <link rel="stylesheet" th:href="@{/css/mobile.css}" />
</head>
<body>

  <div th:replace="fragments/sidebar :: sidebar"></div>
  <div th:replace="~{fragments/mobile-nav :: mobile-nav}"></div>

  <div class="form-page-wrapper">
    <div class="form-card">

      <div class="form-card-header">
        <div class="page-eyebrow" th:text="${cliente.id != null} ? 'Editar Cadastro' : 'Novo Cadastro'"></div>
        <div class="form-card-title" th:text="${cliente.id != null} ? 'Editar Cliente' : 'Novo Cliente'"></div>
        <div class="form-card-subtitle"
             th:text="${cliente.id != null} ? 'Atualize os dados do cliente abaixo' : 'Preencha os dados para cadastrar um novo cliente'">
        </div>
      </div>

      <form th:action="@{/clientes/salvar}" th:object="${cliente}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="form-body">

          <div class="form-group">
            <label for="nome" class="form-label">Nome Completo</label>
            <input id="nome" type="text" th:field="*{nome}" class="form-input" placeholder="Ex: João da Silva" required />
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="cpf" class="form-label">CPF</label>
              <input id="cpf" type="text" th:field="*{cpf}" class="form-input"
                     placeholder="00000000000"
                     th:attr="readonly=${cliente.id != null}"
                     minlength="11" maxlength="11" required />
            </div>
            <div class="form-group">
              <label for="telefone" class="form-label">Telefone</label>
              <input id="telefone" type="text" th:field="*{telefone}" class="form-input" placeholder="(41) 99999-9999" />
            </div>
          </div>

          <div class="form-group">
            <label for="email" class="form-label">E-mail</label>
            <input id="email" type="email" th:field="*{email}" class="form-input" placeholder="email@exemplo.com" required />
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="cep" class="form-label">CEP</label>
              <input id="cep" type="text" th:field="*{cep}" class="form-input" placeholder="00000-000" />
            </div>
            <div class="form-group">
              <label for="estado" class="form-label">Estado</label>
              <input id="estado" type="text" th:field="*{estado}" class="form-input" placeholder="PR" maxlength="2" />
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="cidade" class="form-label">Cidade</label>
              <input id="cidade" type="text" th:field="*{cidade}" class="form-input" placeholder="Curitiba" />
            </div>
            <div class="form-group">
              <label for="endereco" class="form-label">Endereço</label>
              <input id="endereco" type="text" th:field="*{endereco}" class="form-input" placeholder="Rua, número, bairro" />
            </div>
          </div>

          <div class="form-group" th:if="${cliente.id != null}">
            <label for="ativo" class="form-label">Status do Cliente</label>
            <select id="ativo" th:field="*{ativo}" class="form-select">
              <option th:value="true">✔ Ativo</option>
              <option th:value="false">✕ Inativo</option>
            </select>
          </div>

          <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
          <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        </div>

        <div class="form-footer">
          <a href="/clientes/listar" class="btn btn-ghost">← Voltar</a>
          <button type="submit" class="btn btn-primary"
                  th:text="${cliente.id != null} ? 'Salvar Alterações' : 'Cadastrar Cliente'">
          </button>
        </div>

      </form>
    </div>
  </div>
</body>
</html>
