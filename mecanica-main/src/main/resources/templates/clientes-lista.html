<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clientes • Mecanikas</title>
  <link rel="stylesheet" th:href="@{/css/global.css}" />
  <link rel="stylesheet" th:href="@{/css/mobile.css}" />
</head>
<body>

  <div th:replace="fragments/sidebar :: sidebar"></div>
  <div th:replace="~{fragments/mobile-nav :: mobile-nav}"></div>
  
  <div class="main-content">

    <div class="page-header">
      <div class="page-title-group">
        <div class="page-eyebrow">Cadastros</div>
        <div class="page-title">Clientes</div>
        <div class="page-subtitle">Clientes registrados na Mecanikas</div>
      </div>
      <a href="/clientes/cadastrar" class="btn btn-primary">+ Novo Cliente</a>
    </div>

    <!-- Mensagem flash de sucesso/erro -->
    <div th:if="${message}" class="alert alert-success" style="margin-bottom:16px;" th:text="${message}"></div>
    <div th:if="${error}"   class="alert alert-error"   style="margin-bottom:16px;" th:text="${error}"></div>

    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>E-mail</th>
            <th>Telefone</th>
            <th>Cidade</th>
            <th>Cadastro</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="cliente : ${clientes}">
            <td>
              <a th:href="@{'/clientes/editar/' + ${cliente.id}}"
                 style="font-weight:600; color:var(--fg); text-decoration:none;"
                 th:text="${cliente.nome}"></a>
            </td>
            <td>
              <span class="text-muted text-sm" th:text="${cliente.cpf}"></span>
            </td>
            <td th:text="${cliente.email}"></td>
            <td>
              <span class="text-muted text-sm" th:text="${cliente.telefone}"></span>
            </td>
            <td th:text="${cliente.cidade}"></td>
            <td>
              <span class="text-muted text-sm"
                    th:text="${#temporals.format(cliente.dataCadastro, 'dd/MM/yyyy')}"></span>
            </td>
            <td>
              <span th:if="${cliente.ativo}"  class="badge badge-green">Ativo</span>
              <span th:if="${!cliente.ativo}" class="badge badge-red">Inativo</span>
            </td>
            <td>
              <div style="display:flex; gap:6px;">
                <a th:href="@{'/clientes/editar/' + ${cliente.id}}" class="btn btn-ghost btn-sm" title="Editar">✏</a>
                <form th:action="@{'/clientes/inativar/' + ${cliente.id}}" method="post"
                      onsubmit="return confirm('Inativar este cliente? Ele sairá das listas, mas o histórico será preservado.')">
                  <button type="submit" class="btn btn-danger btn-sm" title="Inativar">🗑</button>
                </form>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(clientes)}">
            <td colspan="8" style="text-align:center; padding:40px; color:var(--fg-muted);">
              Nenhum cliente cadastrado ainda.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- ════════ CLIENTES INATIVOS (somente ADMIN) ════════ -->
    <div th:if="${session.usuarioLogado != null and session.usuarioLogado.admin and !#lists.isEmpty(clientesInativos)}"
         style="margin-top:32px;">
      <div style="font-family:var(--font-display); font-size:1.1rem; font-weight:700;
                  text-transform:uppercase; letter-spacing:0.04em; color:var(--fg-muted); margin-bottom:12px;">
        🗄️ Clientes Inativos
      </div>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr><th>Nome</th><th>CPF</th><th>Telefone</th><th></th></tr>
          </thead>
          <tbody>
            <tr th:each="c : ${clientesInativos}" style="opacity:0.6;">
              <td th:text="${c.nome}"></td>
              <td><span class="text-muted text-sm" th:text="${c.cpf}"></span></td>
              <td><span class="text-muted text-sm" th:text="${c.telefone}"></span></td>
              <td>
                <form th:action="@{'/clientes/reativar/' + ${c.id}}" method="post">
                  <button type="submit" class="btn btn-success btn-sm">↩ Reativar</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="text-muted text-sm mt-3">
      © <span th:text="${#dates.format(#dates.createNow(),'yyyy')}"></span> Mecanikas
    </div>

  </div>
</body>
</html>
