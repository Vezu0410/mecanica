# ── Banco de dados ────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/garagemautobot?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Thymeleaf ─────────────────────────────────────────────────────────
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ── REDE LOCAL: escuta em 0.0.0.0 para aceitar conexões do celular ────
# 0.0.0.0 = aceita de qualquer interface de rede (Wi-Fi local incluso)
server.address=0.0.0.0
server.port=8080

# ── Upload de fotos ───────────────────────────────────────────────────
app.upload.fotos-dir=uploads/fotos-veiculo
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=200MB

# ── Sessão ────────────────────────────────────────────────────────────
# Mantém a sessão viva por 8 horas (jornada de trabalho)
server.servlet.session.timeout=480m